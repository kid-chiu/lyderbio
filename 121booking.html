<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約我的時間 | 一對一諮詢</title>
    <style>
        /* 基礎樣式設定 */
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            /* 使用你指定的 Hex #CF2030 */
            background-color: #CF2030; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 網頁卡片容器 */
        .container {
            width: 95%;
            max-width: 900px;
            background-color: #ffffff;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            /* 增加一點深色的投影，讓白卡片在紅背景上更立體 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* 標題設定：將標題也改為同色系紅色以保持一致性 */
        h1 {
            color: #CF2030;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            color: #555;
            margin-bottom: 30px;
        }

        /* 讓行事曆區塊樣式 */
        .calendar-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fff;
        }

        /* 頁尾資訊 */
        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #ffffff; /* 頁尾文字改為白色，在紅背景上才清楚 */
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>線上預約服務</h1>
        <p>請選擇下方適合您的時段，完成後系統將自動發送確認郵件。</p>

        <div class="calendar-wrapper">
            <iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ1pnlL7wbDLMfc-kMJAiOXzO_iE0bdbgnlIpKbIAMkp2JaYhfiLLyKjqniFshD2BQv1HykFPWDv?gv=true" 
                    style="border: 0" 
                    width="100%" 
                    height="700" 
                    frameborder="0">
            </iframe>
            </div>
    </div>

    <div class="footer" style="position: absolute; bottom: 20px; text-align: center; width: 100%;">
        &copy; 2024 我的專屬預約網頁 | Powered by Google Calendar
    </div>

</body>
</html>
